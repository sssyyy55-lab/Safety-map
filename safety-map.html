<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>セーフティマップ — 危険地点アラート</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-title" content="セーフティマップ">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1D21">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --asphalt:#1A1D21;
    --asphalt-2:#23272D;
    --lane:#F5F3EC;
    --yellow:#FFC400;
    --red:#E03131;
    --blue:#2B6CB0;
    --green:#2F9E44;
    --muted:#8A9099;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
    background:var(--asphalt);
    color:var(--lane);
    display:flex;flex-direction:column;
  }

  /* ===== ヘッダー ===== */
  header{
    background:var(--asphalt);
    padding:10px 14px 8px;
    display:flex;align-items:center;justify-content:space-between;
    z-index:1200;position:relative;
    border-bottom:4px solid;
    border-image:repeating-linear-gradient(90deg,var(--yellow) 0 28px,var(--asphalt) 28px 44px) 4;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-sign{
    width:34px;height:34px;background:var(--yellow);
    transform:rotate(45deg);border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 2px var(--asphalt),0 0 0 4px var(--yellow);
  }
  .brand-sign span{transform:rotate(-45deg);font-size:18px;font-weight:800;color:var(--asphalt);}
  .brand h1{font-size:17px;font-weight:800;letter-spacing:.06em;}
  .brand small{display:block;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.15em;}
  #gpsStatus{
    font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;
    background:var(--asphalt-2);color:var(--muted);border:1px solid #333940;
    display:flex;align-items:center;gap:6px;
  }
  #gpsStatus .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
  #gpsStatus.on{color:#7CE0A0;border-color:#2F9E4455;}
  #gpsStatus.on .dot{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.6s infinite;}
  @keyframes pulse{50%{opacity:.4;}}

  /* ===== 地図 ===== */
  #map{flex:1;position:relative;z-index:1;background:#0e1013;}
  .leaflet-container{font-family:inherit;}

  #modeBanner{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    z-index:1100;padding:8px 16px;border-radius:999px;
    font-size:13px;font-weight:800;letter-spacing:.04em;
    display:none;align-items:center;gap:8px;white-space:nowrap;
    box-shadow:0 4px 14px rgba(0,0,0,.45);
  }
  #modeBanner.accident{display:flex;background:var(--yellow);color:var(--asphalt);}
  #modeBanner.stop{display:flex;background:var(--red);color:#fff;}

  /* 現在地に戻すボタン(追従が外れたときだけ表示) */
  #btnFollow{
    position:absolute;right:12px;bottom:76px;z-index:1100;
    display:none;align-items:center;gap:6px;
    padding:10px 16px;border:none;border-radius:999px;cursor:pointer;
    background:var(--blue);color:#fff;font-family:inherit;
    font-size:13px;font-weight:800;letter-spacing:.03em;
    box-shadow:0 4px 14px rgba(0,0,0,.5);
  }
  #btnFollow.show{display:flex;}

  /* ===== マーカー(標識デザイン) ===== */
  .sign-accident{
    width:34px;height:34px;background:var(--yellow);
    transform:rotate(45deg);border-radius:4px;
    border:2.5px solid var(--asphalt);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,.5);
  }
  .sign-accident span{transform:rotate(-45deg);font-size:17px;line-height:1;}
  .sign-stop{
    width:0;height:0;position:relative;
    border-left:21px solid transparent;border-right:21px solid transparent;
    border-top:36px solid var(--red);
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));
  }
  .sign-stop span{
    position:absolute;top:-33px;left:-14px;width:28px;
    text-align:center;color:#fff;font-size:9px;font-weight:800;letter-spacing:.05em;
  }
  .me-dot{
    width:18px;height:18px;border-radius:50%;
    background:#4DA3FF;border:3px solid #fff;
    box-shadow:0 0 0 6px rgba(77,163,255,.25),0 2px 6px rgba(0,0,0,.4);
  }

  .leaflet-popup-content-wrapper{background:var(--asphalt-2);color:var(--lane);border-radius:10px;}
  .leaflet-popup-tip{background:var(--asphalt-2);}
  .leaflet-popup-content{margin:12px 14px;font-size:13px;}
  .popup-title{font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .popup-sub{font-size:11px;color:var(--muted);margin:-4px 0 8px;}
  .popup-del{
    width:100%;padding:8px;border:none;border-radius:8px;cursor:pointer;
    background:#3A2224;color:#FF8A8A;font-weight:700;font-size:12px;
  }

  /* ===== 接近アラート ===== */
  #alertCard{
    position:absolute;left:12px;right:12px;bottom:12px;z-index:1100;
    border-radius:14px;padding:14px 16px;
    display:none;align-items:center;gap:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.55);
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(20px);opacity:0;}}
  #alertCard.accident{display:flex;background:var(--yellow);color:var(--asphalt);}
  #alertCard.stop{display:flex;background:var(--red);color:#fff;}
  #alertCard .icon{font-size:30px;}
  #alertCard .msg{font-size:15px;font-weight:800;line-height:1.35;}
  #alertCard .dist{font-size:12px;font-weight:700;opacity:.85;}

  /* ===== 下部コントロール ===== */
  nav{
    background:var(--asphalt);padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;
    z-index:1200;position:relative;border-top:1px solid #2C3138;
  }
  nav button{
    border:none;border-radius:12px;cursor:pointer;
    padding:10px 4px;font-family:inherit;
    font-size:11px;font-weight:800;letter-spacing:.02em;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    transition:transform .08s;
  }
  nav button:active{transform:scale(.95);}
  nav button .ico{font-size:19px;line-height:1;}
  #btnAccident{background:var(--asphalt-2);color:var(--yellow);border:1.5px solid #4a3d10;}
  #btnAccident.active{background:var(--yellow);color:var(--asphalt);border-color:var(--yellow);}
  #btnStop{background:var(--asphalt-2);color:#FF9B9B;border:1.5px solid #4a2022;}
  #btnStop.active{background:var(--red);color:#fff;border-color:var(--red);}
  #btnGps{background:var(--asphalt-2);color:#8FC7FF;border:1.5px solid #1f3a55;}
  #btnGps.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  #btnSettings{background:var(--asphalt-2);color:var(--muted);border:1.5px solid #333940;padding-left:14px;padding-right:14px;}

  /* ===== 設定パネル ===== */
  #settings{
    position:absolute;left:0;right:0;bottom:0;z-index:1300;
    background:var(--asphalt-2);border-radius:18px 18px 0 0;
    padding:18px 18px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(110%);transition:transform .28s ease;
    box-shadow:0 -8px 30px rgba(0,0,0,.6);
    max-height:80%;overflow-y:auto;
  }
  #settings.open{transform:translateY(0);}
  #settings h2{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--asphalt-2);padding:4px 0;}
  #settings h2 button{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
  .set-row{margin-bottom:16px;}
  .set-row label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;}
  .chip-group{display:flex;gap:8px;}
  .chip{
    flex:1;padding:9px 0;border-radius:10px;border:1.5px solid #3A4048;
    background:var(--asphalt);color:var(--lane);font-family:inherit;
    font-size:13px;font-weight:800;cursor:pointer;
  }
  .chip.sel{background:var(--blue);border-color:var(--blue);color:#fff;}
  .set-actions{display:flex;gap:8px;}
  .set-actions button{
    flex:1;padding:11px;border:none;border-radius:10px;cursor:pointer;
    font-family:inherit;font-size:13px;font-weight:800;
  }
  #btnTestVoice{background:var(--green);color:#fff;}
  #btnClearAll{background:#3A2224;color:#FF8A8A;}
  .voice-toggle{display:flex;align-items:center;justify-content:space-between;}
  .voice-toggle .chip{flex:0 0 88px;}

  /* データ取込セクション */
  .import-box{
    border:1.5px solid #3A4048;border-radius:12px;padding:12px;margin-bottom:14px;
    background:var(--asphalt);
  }
  .import-box h3{font-size:13px;font-weight:800;margin-bottom:4px;}
  .import-box p{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
  .import-btn{
    width:100%;padding:11px;border:none;border-radius:10px;cursor:pointer;
    font-family:inherit;font-size:13px;font-weight:800;margin-bottom:8px;
  }
  .import-btn.stopcsv{background:var(--red);color:#fff;}
  .import-btn.acccsv{background:var(--yellow);color:var(--asphalt);}
  .import-btn.export{background:var(--blue);color:#fff;}
  .import-btn.clearimp{background:#3A2224;color:#FF8A8A;margin-bottom:0;}
  #importStatus{
    font-size:12px;font-weight:700;color:#7CE0A0;line-height:1.5;
    min-height:16px;margin-top:2px;white-space:pre-line;
  }
  #importCounts{font-size:11px;color:var(--muted);margin-top:6px;}
  input[type=file]{display:none;}

  #toast{
    position:absolute;top:56px;left:50%;transform:translateX(-50%);
    z-index:1400;background:rgba(20,22,25,.92);color:var(--lane);
    padding:9px 18px;border-radius:999px;font-size:12px;font-weight:700;
    opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
    border:1px solid #3A4048;
  }
  #toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-sign"><span>!</span></div>
    <div>
      <h1>セーフティマップ</h1>
      <small>TOTTORI EDITION</small>
    </div>
  </div>
  <div id="gpsStatus"><span class="dot"></span><span id="gpsStatusText">GPS 停止中</span></div>
</header>

<div id="map">
  <div id="modeBanner"></div>
  <button id="btnFollow">📍 中央に戻す</button>
  <div id="alertCard">
    <div class="icon" id="alertIcon"></div>
    <div>
      <div class="msg" id="alertMsg"></div>
      <div class="dist" id="alertDist"></div>
    </div>
  </div>
</div>

<nav>
  <button id="btnAccident"><span class="ico">⚠️</span>事故多発</button>
  <button id="btnStop"><span class="ico">🛑</span>一時停止</button>
  <button id="btnGps"><span class="ico">📍</span>GPS開始</button>
  <button id="btnSettings"><span class="ico">⚙️</span>設定</button>
</nav>

<div id="settings">
  <h2>設定 <button id="btnCloseSettings">✕</button></h2>

  <div class="set-row">
    <label>アラート距離(この距離まで近づくと音声で知らせます)</label>
    <div class="chip-group" id="distChips">
      <button class="chip" data-d="50">50m</button>
      <button class="chip sel" data-d="100">100m</button>
      <button class="chip" data-d="200">200m</button>
      <button class="chip" data-d="300">300m</button>
    </div>
  </div>
  <div class="set-row voice-toggle">
    <label style="margin:0">音声アナウンス</label>
    <button class="chip sel" id="btnVoice">ON</button>
  </div>
  <div class="set-row voice-toggle">
    <label style="margin:0">進行方向の前方のみ通知<br><span style="font-weight:400;font-size:10px;">(OFFにすると周囲全方向に通知)</span></label>
    <button class="chip sel" id="btnAhead">ON</button>
  </div>
  <div class="set-actions" style="margin-bottom:16px;">
    <button id="btnTestVoice">🔊 音声テスト</button>
    <button id="btnClearAll">🗑 手動地点を削除</button>
  </div>

  <div class="import-box">
    <h3>📂 公式データの取り込み(鳥取県)</h3>
    <p>大きなファイルのため<b>パソコンでの操作を推奨</b>します。読み込むと鳥取県内のデータだけを自動抽出します。</p>

    <button class="import-btn stopcsv" id="btnImportStop">🛑 一時停止CSVを読み込む(JARTIC)</button>
    <input type="file" id="fileStop" accept=".csv,text/csv,text/plain">

    <button class="import-btn acccsv" id="btnImportAcc">⚠️ 事故CSVを読み込む(警察庁 本票)</button>
    <input type="file" id="fileAcc" accept=".csv,text/csv,text/plain">

    <div id="importStatus"></div>
    <div id="importCounts"></div>

    <button class="import-btn export" id="btnExport" style="margin-top:10px;">💾 共有データを書き出す (spots-data.json)</button>
    <button class="import-btn clearimp" id="btnClearImport">🗑 取込データのみ削除</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
"use strict";

/* ============ 定数 ============ */
const LS_KEY = "safetyMapPoints_v1";      // 手動登録地点
const LS_IMP = "safetyMapImported_v1";    // 取込地点
const LS_DEL = "safetyMapDeleted_v1";     // 取込地点のうち削除したID
const LS_SET = "safetyMapSettings_v1";
// 鳥取県のおおよその範囲(隣県との境界付近を少し含みます)
const BBOX = { latMin: 35.00, latMax: 35.65, lngMin: 133.10, lngMax: 134.55 };
const MAX_IMPORT = 30000;

/* ============ 状態 ============ */
let points = [];        // 手動 {id,type,lat,lng}
let imported = [];      // 取込 {id,type,lat,lng,n?}  n=事故件数
let deletedIds = {};    // 取込のうち削除したもの
let markers = {};       // id -> layer
let addMode = null;
let watchId = null;
let meMarker = null, meCircle = null;
let announced = {};
let settings = { dist: 100, voice: true, ahead: true };  // ahead: 前方の地点のみ通知
let firstFix = true;
let follow = true;   // GPS追跡中、自分を画面中央に保つ
let heading = null;  // 進行方向(度: 北=0, 東=90)
let prevPos = null;

/* ============ 地図 ============ */
const map = L.map("map", { zoomControl: false, preferCanvas: true }).setView([35.5011, 134.2351], 13); // 鳥取市
L.control.zoom({ position: "topright" }).addTo(map);
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);
const canvasRenderer = L.canvas({ padding: 0.4 });

/* ============ アイコン ============ */
function makeIcon(type) {
  if (type === "accident") {
    return L.divIcon({
      className: "", iconSize: [40, 40], iconAnchor: [20, 20],
      html: '<div class="sign-accident"><span>⚠️</span></div>'
    });
  }
  return L.divIcon({
    className: "", iconSize: [42, 36], iconAnchor: [21, 36],
    html: '<div class="sign-stop"><span>止まれ</span></div>'
  });
}
const meIcon = L.divIcon({ className: "", iconSize: [18, 18], iconAnchor: [9, 9], html: '<div class="me-dot"></div>' });

/* ============ 保存・読込 ============ */
function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(points)); } catch(e){} }
function saveImported() {
  try { localStorage.setItem(LS_IMP, JSON.stringify(imported)); }
  catch(e){ toast("保存容量を超えました。取込データが多すぎます"); }
}
function saveDeleted() { try { localStorage.setItem(LS_DEL, JSON.stringify(deletedIds)); } catch(e){} }
function saveSettings() { try { localStorage.setItem(LS_SET, JSON.stringify(settings)); } catch(e){} }

function loadAll() {
  try {
    const p = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
    if (Array.isArray(p)) p.forEach(pt => { if (valid(pt)) { points.push(pt); drawPoint(pt); } });
  } catch(e){}
  try { deletedIds = JSON.parse(localStorage.getItem(LS_DEL) || "{}") || {}; } catch(e){}
  try {
    const im = JSON.parse(localStorage.getItem(LS_IMP) || "[]");
    if (Array.isArray(im)) im.forEach(pt => { if (valid(pt) && !deletedIds[pt.id]) { imported.push(pt); drawPoint(pt); } });
  } catch(e){}
  try {
    const s = JSON.parse(localStorage.getItem(LS_SET) || "{}");
    if (s && typeof s === "object") settings = Object.assign(settings, s);
  } catch(e){}
  document.querySelectorAll("#distChips .chip").forEach(c => {
    c.classList.toggle("sel", Number(c.dataset.d) === settings.dist);
  });
  updateVoiceBtn();
  updateAheadBtn();
  updateCounts();
}
function valid(pt){ return pt && pt.id && typeof pt.lat === "number" && typeof pt.lng === "number" && (pt.type === "stop" || pt.type === "accident"); }

/* ============ 共有データ(spots-data.json)の自動読込 ============ */
async function loadSharedData() {
  if (location.protocol !== "http:" && location.protocol !== "https:") return;
  try {
    const res = await fetch("spots-data.json", { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    const list = Array.isArray(data) ? data : (data.points || []);
    const have = {};
    imported.forEach(p => have[p.id] = 1);
    points.forEach(p => have[p.id] = 1);
    let added = 0;
    for (const pt of list) {
      if (!valid(pt) || have[pt.id] || deletedIds[pt.id]) continue;
      imported.push(pt); drawPoint(pt); have[pt.id] = 1; added++;
    }
    if (added > 0) {
      saveImported(); updateCounts();
      toast("共有データを読み込みました(" + added + "件)");
    }
  } catch(e){ /* ファイルが無ければ何もしない */ }
}

/* ============ 描画 ============ */
function drawPoint(pt) {
  let layer;
  const isImported = pt.id.startsWith("j") || pt.id.startsWith("a");
  if (isImported) {
    // 取込地点: 軽量な円マーカー(数千件でも軽い)
    // 事故地点は件数が多いほど大きく表示(1件=小、2件以上=大)
    const r = pt.type === "stop" ? 6 : (pt.n >= 2 ? 9 : 5.5);
    layer = L.circleMarker([pt.lat, pt.lng], {
      renderer: canvasRenderer,
      radius: r,
      color: "#1A1D21", weight: 1.5,
      fillColor: pt.type === "stop" ? "#E03131" : "#FFC400",
      fillOpacity: pt.type === "stop" ? 0.9 : (pt.n >= 2 ? 0.95 : 0.75)
    }).addTo(map);
  } else {
    layer = L.marker([pt.lat, pt.lng], { icon: makeIcon(pt.type) }).addTo(map);
  }
  const label = pt.type === "accident" ? "⚠️ 事故多発地点" : "🛑 一時停止";
  const sub = pt.id.startsWith("j") ? "出典: JARTIC 交通規制情報"
            : pt.id.startsWith("a") ? "出典: 警察庁 事故統計" + (pt.n ? "(" + pt.n + "件)" : "")
            : "手動登録";
  const div = document.createElement("div");
  div.innerHTML = '<div class="popup-title">' + label + '</div><div class="popup-sub">' + sub + '</div>';
  const del = document.createElement("button");
  del.className = "popup-del";
  del.textContent = "この地点を削除";
  del.onclick = () => removePoint(pt.id);
  div.appendChild(del);
  layer.bindPopup(div);
  markers[pt.id] = layer;
}

function removePoint(id) {
  const m = markers[id];
  if (m) { map.removeLayer(m); delete markers[id]; }
  const before = points.length + imported.length;
  points = points.filter(p => p.id !== id);
  imported = imported.filter(p => p.id !== id);
  if (id.startsWith("j") || id.startsWith("a")) { deletedIds[id] = 1; saveDeleted(); saveImported(); }
  else save();
  delete announced[id];
  if (points.length + imported.length < before) toast("地点を削除しました");
  updateCounts();
}

function allPoints(){ return imported.length ? points.concat(imported) : points; }

/* ============ 地図タップで手動登録 ============ */
map.on("click", e => {
  if (!addMode) return;
  const pt = {
    id: "p" + Date.now() + Math.floor(Math.random() * 1000),
    type: addMode, lat: e.latlng.lat, lng: e.latlng.lng
  };
  points.push(pt); drawPoint(pt); save(); updateCounts();
  toast(addMode === "accident" ? "⚠️ 事故多発地点を登録しました" : "🛑 一時停止を登録しました");
});

/* ============ モード切替 ============ */
const btnAccident = document.getElementById("btnAccident");
const btnStop = document.getElementById("btnStop");
const banner = document.getElementById("modeBanner");
function setMode(mode) {
  addMode = (addMode === mode) ? null : mode;
  btnAccident.classList.toggle("active", addMode === "accident");
  btnStop.classList.toggle("active", addMode === "stop");
  banner.className = addMode || "";
  if (addMode === "accident") banner.textContent = "地図をタップ → ⚠️ 事故多発地点を登録";
  if (addMode === "stop") banner.textContent = "地図をタップ → 🛑 一時停止を登録";
}
btnAccident.onclick = () => setMode("accident");
btnStop.onclick = () => setMode("stop");

/* ============ GPS ============ */
const btnGps = document.getElementById("btnGps");
const gpsStatus = document.getElementById("gpsStatus");
const gpsStatusText = document.getElementById("gpsStatusText");
btnGps.onclick = () => { if (watchId != null) stopGps(); else startGps(); };

// 地図を手で動かしたら追従を一時停止し、「中央に戻す」ボタンを表示
const btnFollow = document.getElementById("btnFollow");
map.on("dragstart", () => {
  if (watchId != null && follow) {
    follow = false;
    btnFollow.classList.add("show");
  }
});
btnFollow.onclick = () => {
  follow = true;
  btnFollow.classList.remove("show");
  if (meMarker) map.setView(meMarker.getLatLng(), map.getZoom(), { animate: true });
};

function startGps() {
  if (!navigator.geolocation) { toast("この端末はGPSに対応していません"); return; }
  unlockVoice();
  firstFix = true;
  follow = true;
  btnFollow.classList.remove("show");
  watchId = navigator.geolocation.watchPosition(onPos, onGpsError, {
    enableHighAccuracy: true, maximumAge: 2000, timeout: 15000
  });
  btnGps.classList.add("active");
  btnGps.innerHTML = '<span class="ico">📍</span>GPS停止';
  gpsStatus.classList.add("on");
  gpsStatusText.textContent = "GPS 取得中…";
}
function stopGps() {
  if (watchId != null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  btnFollow.classList.remove("show");
  btnGps.classList.remove("active");
  btnGps.innerHTML = '<span class="ico">📍</span>GPS開始';
  gpsStatus.classList.remove("on");
  gpsStatusText.textContent = "GPS 停止中";
  hideAlert();
}
function onGpsError(err) {
  stopGps();
  toast(err.code === 1 ? "位置情報が許可されていません。ブラウザの設定をご確認ください" : "位置情報を取得できませんでした");
}
function onPos(pos) {
  const lat = pos.coords.latitude, lng = pos.coords.longitude;
  const acc = pos.coords.accuracy || 0;
  gpsStatusText.textContent = "GPS 追跡中(±" + Math.round(acc) + "m)";
  if (!meMarker) {
    meMarker = L.marker([lat, lng], { icon: meIcon, zIndexOffset: 1000 }).addTo(map);
    meCircle = L.circle([lat, lng], { radius: acc, color: "#4DA3FF", weight: 1, fillOpacity: 0.08 }).addTo(map);
  } else {
    meMarker.setLatLng([lat, lng]);
    meCircle.setLatLng([lat, lng]).setRadius(acc);
  }
  if (firstFix) { map.setView([lat, lng], 16); firstFix = false; }
  else if (follow) { map.setView([lat, lng], map.getZoom(), { animate: true }); }

  // 進行方向の推定: GPSのheading(移動中のみ有効)、無ければ直前位置からの方角
  const spd = pos.coords.speed;
  if (pos.coords.heading != null && !isNaN(pos.coords.heading) && spd != null && spd > 1.5) {
    heading = pos.coords.heading;
  } else if (prevPos) {
    const moved = distanceM(prevPos.lat, prevPos.lng, lat, lng);
    if (moved > 8) heading = bearingDeg(prevPos.lat, prevPos.lng, lat, lng);
  }
  prevPos = { lat, lng };

  checkProximity(lat, lng);
}

/* ============ 距離計算 ============ */
function distanceM(lat1, lng1, lat2, lng2) {
  const R = 6371000, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLng = (lng2 - lng1) * rad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// 2地点間の方角(度: 北=0, 東=90)
function bearingDeg(lat1, lng1, lat2, lng2) {
  const rad = Math.PI / 180;
  const y = Math.sin((lng2 - lng1) * rad) * Math.cos(lat2 * rad);
  const x = Math.cos(lat1 * rad) * Math.sin(lat2 * rad) -
            Math.sin(lat1 * rad) * Math.cos(lat2 * rad) * Math.cos((lng2 - lng1) * rad);
  return (Math.atan2(y, x) / rad + 360) % 360;
}

// 地点が進行方向の前方(±60度)にあるか
function isAhead(lat, lng, pt) {
  if (!settings.ahead || heading == null) return true; // 方向不明時は全方向に通知
  const b = bearingDeg(lat, lng, pt.lat, pt.lng);
  const diff = Math.abs(((b - heading + 540) % 360) - 180);
  return diff <= 60;
}

/* ============ 接近チェック ============ */
function checkProximity(lat, lng) {
  let nearest = null, nearestD = Infinity;
  const list = allPoints();
  for (const pt of list) {
    // 高速化: 明らかに遠い地点はスキップ(緯度経度の差でざっくり判定)
    if (Math.abs(pt.lat - lat) > 0.01 || Math.abs(pt.lng - lng) > 0.012) { 
      if (announced[pt.id]) delete announced[pt.id];
      continue; 
    }
    const d = distanceM(lat, lng, pt.lat, pt.lng);
    if (d <= settings.dist) {
      if (!isAhead(lat, lng, pt)) continue;  // 前方以外は通知しない
      if (!announced[pt.id]) { announced[pt.id] = true; announce(pt, d); }
      if (d < nearestD) { nearestD = d; nearest = pt; }
    } else if (d > settings.dist * 1.5) {
      delete announced[pt.id];
    }
  }
  if (nearest) showAlert(nearest, nearestD);
  else hideAlert();
}

function announce(pt, d) {
  const dTxt = "およそ" + roundDist(d) + "メートル先、";
  let msg;
  if (pt.type === "accident") {
    msg = (pt.n >= 2)
      ? dTxt + "事故多発地点です。速度を落として、ご注意ください。"
      : dTxt + "過去に事故が発生した地点です。ご注意ください。";
  } else {
    msg = dTxt + "一時停止があります。必ず止まってください。";
  }
  speak(msg);
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}
function roundDist(d) { return d < 30 ? "20" : String(Math.round(d / 10) * 10); }

/* ============ アラート表示 ============ */
const alertCard = document.getElementById("alertCard");
function showAlert(pt, d) {
  alertCard.className = pt.type;
  document.getElementById("alertIcon").textContent = pt.type === "accident" ? "⚠️" : "🛑";
  document.getElementById("alertMsg").textContent =
    pt.type === "accident"
      ? (pt.n >= 2 ? "事故多発地点 接近中" : "事故発生地点 接近中")
      : "一時停止 接近中";
  document.getElementById("alertDist").textContent = "約 " + Math.round(d) + "m 先";
}
function hideAlert() { alertCard.className = ""; }

/* ============ 音声 ============ */
let jaVoice = null;
function pickVoice() {
  const vs = speechSynthesis.getVoices();
  jaVoice = vs.find(v => v.lang === "ja-JP") || vs.find(v => v.lang && v.lang.startsWith("ja")) || null;
}
if ("speechSynthesis" in window) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function unlockVoice() {
  if (!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(""); u.volume = 0; speechSynthesis.speak(u);
}
function speak(text) {
  if (!settings.voice) return;
  if (!("speechSynthesis" in window)) { toast(text); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP"; if (jaVoice) u.voice = jaVoice;
  u.rate = 1.0; u.volume = 1.0;
  speechSynthesis.speak(u);
}

/* ==================================================
   CSV取り込み(ストリーミング処理・Shift_JIS対応)
   ================================================== */
const statusEl = document.getElementById("importStatus");
function setStatus(t){ statusEl.textContent = t; }

function inBbox(lat, lng){
  return lat >= BBOX.latMin && lat <= BBOX.latMax && lng >= BBOX.lngMin && lng <= BBOX.lngMax;
}

// ファイルを分割して1行ずつ処理(巨大CSVでもメモリを圧迫しない)
async function streamLines(file, onLine, onProgress) {
  const CHUNK = 4 * 1024 * 1024;
  // 文字コード判定: 先頭を UTF-8 として厳密デコードできれば UTF-8、失敗なら Shift_JIS
  let enc = "utf-8";
  try {
    const head = await file.slice(0, 65536).arrayBuffer();
    new TextDecoder("utf-8", { fatal: true }).decode(head.byteLength > 8 ? head.slice(0, head.byteLength - 4) : head);
  } catch(e) { enc = "shift_jis"; }
  const decoder = new TextDecoder(enc);
  let leftover = "";
  for (let offset = 0; offset < file.size; offset += CHUNK) {
    const buf = await file.slice(offset, offset + CHUNK).arrayBuffer();
    const text = leftover + decoder.decode(buf, { stream: true });
    const lines = text.split(/\r?\n/);
    leftover = lines.pop();
    for (const line of lines) onLine(line);
    if (onProgress) onProgress(Math.min(offset + CHUNK, file.size) / file.size);
    await new Promise(r => setTimeout(r, 0)); // UIを固まらせない
  }
  if (leftover) onLine(leftover);
}

/* ---- ① JARTIC 交通規制情報CSV → 一時停止(コード63) ---- */
document.getElementById("btnImportStop").onclick = () => document.getElementById("fileStop").click();
document.getElementById("fileStop").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  setStatus("読み込み中… 0%");
  const grid = {};                        // 重複除去用(約11m格子)
  imported.forEach(p => { if (p.type === "stop") grid[gridKey(p.lat, p.lng)] = 1; });
  const found = [];
  const coordPair = /(1[23][0-9]\.\d+)[ 　]+([23][0-9]\.\d+)|([23][0-9]\.\d+)[ 　]+(1[23][0-9]\.\d+)/;
  let codeIdx = -1, coordIdx = -1, headerChecked = false;
  let wrongStopFile = null;

  try {
    await streamLines(file, (line) => {
      if (found.length >= MAX_IMPORT || wrongStopFile) return;
      const cells = line.split(",").map(c => c.replace(/^["']|["']$/g, "").trim());
      // 1行目がヘッダーなら列位置を特定(拡張版標準フォーマット K_2.1 対応)
      if (!headerChecked) {
        headerChecked = true;
        if (line.includes("本票番号") || line.includes("事故内容")) {
          wrongStopFile = "これは警察庁の事故CSVです。\nJARTICの交通規制情報CSV(鳥取県警_◯◯.csv)を選んでください";
          return;
        }
        if (line.includes("規制種別コード") || line.includes("経度緯度")) {
          cells.forEach((c, i) => {
            if (codeIdx < 0 && c.includes("共通規制種別コード")) codeIdx = i;
            if (coordIdx < 0 && c.includes("経度緯度") && !c.includes("除外")) coordIdx = i;
          });
          return; // ヘッダー行は読み飛ばす
        }
      }
      // 種別コード63(一時停止)の行のみ対象
      if (codeIdx >= 0) {
        if (cells[codeIdx] !== "63") return;
      } else {
        if (!cells.some((c, i) => i < 15 && c === "63")) return;
      }
      // 座標(「経度 緯度」の空白区切り)を抽出
      const target = (coordIdx >= 0 && cells[coordIdx]) ? cells[coordIdx] : line;
      const m = target.match(coordPair);
      if (!m) return;
      let lng, lat;
      if (m[1] !== undefined) { lng = parseFloat(m[1]); lat = parseFloat(m[2]); }
      else { lat = parseFloat(m[3]); lng = parseFloat(m[4]); }
      if (!inBbox(lat, lng)) return;
      const key = gridKey(lat, lng);
      if (grid[key]) return;
      grid[key] = 1;
      found.push({ id: "j" + key, type: "stop", lat: Number(lat.toFixed(6)), lng: Number(lng.toFixed(6)) });
    }, (p) => setStatus("読み込み中… " + Math.round(p * 100) + "%"));
  } catch(err) {
    setStatus("読み込みに失敗しました: " + err.message);
    e.target.value = ""; return;
  }

  if (wrongStopFile) { setStatus("⚠️ " + wrongStopFile); e.target.value = ""; return; }

  let added = 0;
  for (const pt of found) {
    if (deletedIds[pt.id]) continue;
    imported.push(pt); drawPoint(pt); added++;
  }
  saveImported(); updateCounts();
  setStatus(added > 0
    ? "✅ 鳥取県の一時停止 " + added + "件を取り込みました"
    : "対象データが見つかりませんでした。CSVの種類をご確認ください(交通規制情報のCSVが必要です)");
  if (added > 0 && found.length) map.setView([found[0].lat, found[0].lng], 12);
  e.target.value = "";
};

function gridKey(lat, lng){ return Math.round(lat * 10000) + "_" + Math.round(lng * 10000); }

/* ---- ② 警察庁 事故統計CSV(本票) → 2件以上の地点を事故多発扱い ---- */
document.getElementById("btnImportAcc").onclick = () => document.getElementById("fileAcc").click();
document.getElementById("fileAcc").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  setStatus("読み込み中… 0%");
  let latCol = -1, lngCol = -1, headerDone = false;
  let wrongFile = null;
  const cellCount = {};   // 約100m格子: 件数と座標合計

  try {
    await streamLines(file, (line) => {
      if (wrongFile) return;
      const cells = line.split(",").map(c => c.replace(/^["']|["']$/g, "").trim());
      if (!headerDone) {
        headerDone = true;
        // ファイル種別チェック: JARTICの規制CSVを選んでいたら中断
        if (line.includes("規制場所") || line.includes("共通規制種別")) {
          wrongFile = "これはJARTIC(交通規制情報)のCSVです。\n警察庁の本票CSV(honhyo_◯◯.csv)を選んでください";
          return;
        }
        cells.forEach((c, i) => {
          if (latCol < 0 && c.includes("緯度")) latCol = i;
          if (lngCol < 0 && c.includes("経度")) lngCol = i;
        });
        if (latCol >= 0 && lngCol >= 0) return; // ヘッダー行として消費
        // ヘッダーに見出しが無ければ、この行もデータとして続行(下のフォールバックで処理)
      }
      let lat = NaN, lng = NaN;
      if (latCol >= 0 && lngCol >= 0) {
        lat = dmsToDeg(cells[latCol], 2);
        lng = dmsToDeg(cells[lngCol], 3);
      }
      if (isNaN(lat) || isNaN(lng)) {
        // フォールバック: 度分秒形式(9〜10桁の数値)のペアを探す
        for (let i = 0; i < cells.length - 1; i++) {
          const a = dmsToDeg(cells[i], 2), b = dmsToDeg(cells[i + 1], 3);
          if (!isNaN(a) && !isNaN(b) && a > 20 && a < 46 && b > 122 && b < 154) { lat = a; lng = b; break; }
        }
      }
      if (isNaN(lat) || isNaN(lng) || !inBbox(lat, lng)) return;
      const key = Math.round(lat * 1000) + "_" + Math.round(lng * 1000); // 約100m格子
      if (!cellCount[key]) cellCount[key] = { n: 0, sLat: 0, sLng: 0 };
      cellCount[key].n++; cellCount[key].sLat += lat; cellCount[key].sLng += lng;
    }, (p) => setStatus("読み込み中… " + Math.round(p * 100) + "%"));
  } catch(err) {
    setStatus("読み込みに失敗しました: " + err.message);
    e.target.value = ""; return;
  }

  if (wrongFile) { setStatus("⚠️ " + wrongFile); e.target.value = ""; return; }

  const have = {};
  imported.forEach(p => have[p.id] = 1);
  let added = 0, total = 0, multi = 0;
  for (const key in cellCount) {
    const c = cellCount[key];
    total += c.n;
    if (c.n >= 2) multi++;
    const id = "a" + key;
    if (have[id] || deletedIds[id]) continue;
    const pt = { id, type: "accident", lat: c.sLat / c.n, lng: c.sLng / c.n, n: c.n };
    imported.push(pt); drawPoint(pt); added++;
  }
  saveImported(); updateCounts();
  setStatus(total > 0
    ? "✅ 鳥取県内の事故 " + total + "件を分析\n事故地点 " + added + "か所を登録しました(うち2件以上の多発地点 " + multi + "か所は大きい丸で表示)"
    : "鳥取県内の事故データが見つかりませんでした。\n警察庁の本票CSV(honhyo_◯◯.csv)を選んだかご確認ください");
  e.target.value = "";
};

// 度分秒パック形式(例: 353012345 = 35度30分12.345秒)→ 十進度
function dmsToDeg(s, degDigits) {
  if (!s || !/^\d{8,10}$/.test(s)) return NaN;
  const deg = Number(s.slice(0, degDigits));
  const min = Number(s.slice(degDigits, degDigits + 2));
  const sec = Number(s.slice(degDigits + 2, degDigits + 4));
  const ms  = Number(s.slice(degDigits + 4) || "0") / Math.pow(10, s.length - degDigits - 4);
  if (min >= 60 || sec >= 60) return NaN;
  return deg + min / 60 + (sec + ms) / 3600;
}

/* ---- ③ 共有データの書き出し ---- */
document.getElementById("btnExport").onclick = () => {
  const data = { version: 1, exported: new Date().toISOString(), points: imported.concat(points) };
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "spots-data.json";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("spots-data.json を保存しました");
};

/* ---- ④ 取込データの削除 ---- */
document.getElementById("btnClearImport").onclick = () => {
  if (!imported.length) { toast("取込データはありません"); return; }
  if (!confirm("取り込んだ公式データ(" + imported.length + "件)を削除しますか?\n(手動登録の地点は残ります)")) return;
  imported.forEach(p => { const m = markers[p.id]; if (m) { map.removeLayer(m); delete markers[p.id]; } });
  imported = []; deletedIds = {};
  saveImported(); saveDeleted(); updateCounts();
  setStatus(""); toast("取込データを削除しました");
};

function updateCounts() {
  const s = imported.filter(p => p.type === "stop").length;
  const a = imported.filter(p => p.type === "accident").length;
  document.getElementById("importCounts").textContent =
    "現在: 取込 一時停止 " + s + "件 / 事故多発 " + a + "件 / 手動 " + points.length + "件";
}

/* ============ 設定パネル ============ */
const settingsPanel = document.getElementById("settings");
document.getElementById("btnSettings").onclick = () => settingsPanel.classList.add("open");
document.getElementById("btnCloseSettings").onclick = () => settingsPanel.classList.remove("open");

document.querySelectorAll("#distChips .chip").forEach(c => {
  c.onclick = () => {
    document.querySelectorAll("#distChips .chip").forEach(x => x.classList.remove("sel"));
    c.classList.add("sel");
    settings.dist = Number(c.dataset.d);
    announced = {};
    saveSettings();
  };
});
const btnVoice = document.getElementById("btnVoice");
function updateVoiceBtn() {
  btnVoice.textContent = settings.voice ? "ON" : "OFF";
  btnVoice.classList.toggle("sel", settings.voice);
}
btnVoice.onclick = () => {
  settings.voice = !settings.voice;
  updateVoiceBtn(); saveSettings();
  if (settings.voice) unlockVoice();
};

const btnAhead = document.getElementById("btnAhead");
function updateAheadBtn() {
  btnAhead.textContent = settings.ahead ? "ON" : "OFF";
  btnAhead.classList.toggle("sel", settings.ahead);
}
btnAhead.onclick = () => {
  settings.ahead = !settings.ahead;
  updateAheadBtn(); saveSettings();
  announced = {};
  toast(settings.ahead ? "前方(±60度)の地点のみ通知します" : "周囲全方向の地点に通知します");
};
document.getElementById("btnTestVoice").onclick = () => {
  unlockVoice();
  const bak = settings.voice; settings.voice = true;
  speak("音声テストです。この先、一時停止があります。必ず止まってください。");
  settings.voice = bak;
};
document.getElementById("btnClearAll").onclick = () => {
  if (!points.length) { toast("手動登録された地点はありません"); return; }
  if (confirm("手動登録した地点(" + points.length + "件)を削除しますか?\n(取り込んだ公式データは残ります)")) {
    points.forEach(p => { const m = markers[p.id]; if (m) { map.removeLayer(m); delete markers[p.id]; } });
    points = []; save(); updateCounts();
    toast("手動地点を削除しました");
  }
};

/* ============ トースト ============ */
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
}

/* ============ 初期化 ============ */
loadAll();
loadSharedData();
if (points.length === 0 && imported.length === 0) {
  setTimeout(() => toast("⚙️設定から公式データを取り込めます"), 800);
}
